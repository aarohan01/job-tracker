<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Job Tracker Snapshot</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Read-only snapshot</p>
          <h1>Job Tracker</h1>
        </div>
        <div class="updated">
          <span>Last updated</span>
          <strong id="lastUpdated">-</strong>
        </div>
      </header>

      <section class="metrics" aria-label="Tracker summary">
        <div><span>Total</span><strong id="totalCount">0</strong></div>
        <div><span>High Priority</span><strong id="priorityCount">0</strong></div>
        <div><span>Tracking</span><strong id="trackingCount">0</strong></div>
        <div><span>Trash</span><strong id="trashCount">0</strong></div>
        <div><span>Rejected</span><strong id="rejectedCount">0</strong></div>
      </section>

      <section class="controls" aria-label="Filters">
        <input id="searchInput" type="search" placeholder="Search company, role, status, notes">
        <select id="statusFilter" aria-label="Status filter">
          <option value="">All statuses</option>
        </select>
      </section>

      <nav class="tabs" aria-label="Views">
        <button class="tab active" type="button" data-view="priority">High Priority</button>
        <button class="tab" type="button" data-view="applications">Applications</button>
        <button class="tab" type="button" data-view="trash">Trash</button>
      </nav>

      <section class="viewHeader">
        <h2 id="viewTitle">High Priority</h2>
        <span id="shownCount">0 shown</span>
      </section>

      <section id="cards" class="cards" aria-live="polite"></section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
